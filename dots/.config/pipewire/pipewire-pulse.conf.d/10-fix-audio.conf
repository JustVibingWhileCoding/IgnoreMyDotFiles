pulse.rules = [
    {
        # prevent all sources matching "Chromium" from messing with the volume
        matches = [ 
            { application.name = "~Chromium.*" } 
            { application.process.binary = "vesktop" }
            { application.process.binary = "Discord" }
        ]
        actions = { quirks = [ block-source-volume ] }
    }
]
